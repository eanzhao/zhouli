<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周礼六官学习图</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-color: #fdfbf7;
            --paper: rgba(244, 238, 220, 0.88);
            --king-bg: #8c2e2e;
            --minister-bg: #2b4c50;
            --card-bg: rgba(244, 238, 220, 0.96);
            --gold: #bd9b5b;
            --gold-soft: rgba(189, 155, 91, 0.24);
            --text-dark: #3a322c;
            --text-light: #f9f6f0;
            --muted: #655b52;
            --jade-border: #7b8d82;
            --shadow: 0 10px 24px rgba(58, 50, 44, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at top left, rgba(189, 155, 91, 0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(43, 76, 80, 0.08), transparent 32%),
                repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0, 0, 0, 0.025) 30px, rgba(0, 0, 0, 0.025) 31px);
            color: var(--text-dark);
            font-family: "STSong", "Songti SC", "Noto Serif SC", serif;
            line-height: 1.6;
            background-attachment: fixed;
        }

        a {
            color: inherit;
        }

        .border-outer,
        .border-inner {
            position: fixed;
            inset: 10px;
            pointer-events: none;
            z-index: 999;
        }

        .border-outer {
            border: 5px solid var(--jade-border);
            opacity: 0.68;
        }

        .border-inner {
            inset: 20px;
            border: 1px solid var(--gold);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1480px;
            margin: 0 auto;
            padding: 56px 20px 96px;
        }

        .header {
            text-align: center;
            margin-bottom: 26px;
        }

        .header h1 {
            margin: 0 0 10px;
            font-size: clamp(2.2rem, 3.6vw, 3rem);
            color: var(--king-bg);
            letter-spacing: 0.22em;
        }

        .header p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
            letter-spacing: 0.14em;
        }

        .header-meta {
            position: relative;
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ornament {
            margin: 28px auto 0;
            width: 96px;
            height: 12px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            position: relative;
        }

        .ornament::before {
            content: "⬥";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -52%);
            color: var(--king-bg);
            background: var(--bg-color);
            padding: 0 10px;
            font-size: 0.9rem;
        }

        .references-panel {
            background: var(--paper);
            border: 1px solid rgba(189, 155, 91, 0.42);
            border-left: 5px solid var(--king-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .panel-title {
            margin: 0 0 12px;
            color: var(--king-bg);
            font-size: 1rem;
            letter-spacing: 0.08em;
        }

        .references-panel ul {
            margin: 0;
            padding-left: 1.35rem;
            color: var(--muted);
        }

        .references-panel li {
            margin-bottom: 0.5rem;
        }

        .org-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
        }

        .king-wrap {
            position: relative;
            padding-bottom: 30px;
        }

        .king-wrap::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 2px;
            height: 30px;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, var(--gold), transparent);
        }

        .king-node {
            background: var(--king-bg);
            color: var(--text-light);
            padding: 24px 52px;
            border-radius: 8px;
            border: 2px solid var(--gold);
            outline: 6px solid rgba(140, 46, 46, 0.18);
            box-shadow: 0 12px 24px rgba(58, 50, 44, 0.18);
            text-align: center;
        }

        .king-title {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.45rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
        }

        .king-sub {
            margin: 8px 0 0;
            font-size: 1rem;
            color: #ebd8b1;
            letter-spacing: 0.14em;
        }

        .departments-row {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 18px;
            align-items: start;
        }

        .dept-col {
            min-width: 0;
        }

        .minister-node {
            background: var(--minister-bg);
            color: var(--text-light);
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 16px 14px 14px;
            box-shadow: var(--shadow);
            position: relative;
            min-height: 116px;
        }

        .minister-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .minister-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 28px;
        }

        .seal {
            position: absolute;
            top: -12px;
            right: -10px;
            width: 34px;
            height: 34px;
            border-radius: 5px;
            display: grid;
            place-items: center;
            background: var(--king-bg);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 2px 2px 5px rgba(58, 50, 44, 0.3);
            transform: rotate(10deg);
            font-size: 0.95rem;
        }

        .m-title {
            margin: 0;
            font-size: 1.45rem;
            letter-spacing: 0.08em;
        }

        .m-sub {
            margin: 0;
            color: #d8cab0;
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .source-link,
        .source-button {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.82rem;
            color: #f2dfba;
            text-decoration: none;
            border-bottom: 1px dashed rgba(242, 223, 186, 0.5);
            background: transparent;
            padding: 0;
            border-top: 0;
            border-left: 0;
            border-right: 0;
            cursor: pointer;
            font: inherit;
        }

        .source-link:hover,
        .source-button:hover,
        .source-button:focus-visible {
            color: #fff3d9;
            border-bottom-color: rgba(255, 243, 217, 0.9);
            outline: none;
        }

        .sub-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .sub-node {
            width: 100%;
            text-align: left;
            cursor: pointer;
            border: 1px solid rgba(189, 155, 91, 0.52);
            border-left: 4px solid var(--king-bg);
            border-radius: 6px;
            background: var(--card-bg);
            padding: 12px 12px 11px;
            box-shadow: 0 4px 10px rgba(58, 50, 44, 0.06);
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
            font: inherit;
            color: inherit;
        }

        .sub-node:hover,
        .sub-node:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(58, 50, 44, 0.12);
            border-color: var(--gold);
            outline: none;
        }

        .s-head {
            display: flex;
            align-items: center;
        }

        .s-title {
            margin: 0;
            font-size: 1.02rem;
            color: var(--king-bg);
            font-weight: 700;
        }

        .s-desc {
            margin: 8px 0 0;
            color: #574d44;
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .info-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .info-wrap.is-header {
            position: static;
        }

        .info-btn {
            appearance: none;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: 1px solid rgba(189, 155, 91, 0.65);
            border-radius: 999px;
            background: rgba(244, 238, 220, 0.92);
            color: var(--king-bg);
            font: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(58, 50, 44, 0.08);
            transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
        }

        .info-btn:hover,
        .info-btn:focus-visible {
            transform: translateY(-1px);
            border-color: var(--gold);
            box-shadow: 0 8px 14px rgba(58, 50, 44, 0.12);
            outline: none;
        }

        .info-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: min(320px, calc(100vw - 40px));
            padding: 14px 15px;
            background: rgba(253, 251, 247, 0.98);
            border: 1px solid rgba(189, 155, 91, 0.5);
            border-radius: 10px;
            box-shadow: 0 18px 34px rgba(58, 50, 44, 0.16);
            color: #4b4038;
            z-index: 120;
        }

        .info-popover.is-wide {
            width: min(380px, calc(100vw - 40px));
        }

        .info-wrap.is-header .info-popover {
            right: auto;
            left: 50%;
            transform: translateX(-50%);
            width: min(560px, calc(100vw - 32px));
            text-align: left;
        }

        .info-popover-title {
            margin: 0 0 10px;
            color: var(--king-bg);
            font-size: 0.98rem;
            letter-spacing: 0.06em;
        }

        .info-popover p {
            margin: 0;
            font-size: 0.92rem;
            line-height: 1.75;
        }

        .info-popover p + p {
            margin-top: 10px;
        }

        .info-list {
            margin: 0;
            padding-left: 1.2rem;
            color: #5d5148;
        }

        .info-list li + li {
            margin-top: 0.45rem;
        }

        .info-footnote {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.7;
        }

        .references-panel {
            max-width: 1080px;
            margin: 40px auto 0;
            padding: 18px 22px;
        }

        .references-panel a {
            color: var(--minister-bg);
            text-decoration: none;
            border-bottom: 1px dashed rgba(43, 76, 80, 0.4);
        }

        .references-panel a:hover {
            color: #18363a;
            border-bottom-color: rgba(24, 54, 58, 0.9);
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(43, 76, 80, 0.42);
            backdrop-filter: blur(4px);
            z-index: 10000;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            width: min(880px, 100%);
            max-height: min(82vh, 900px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            background-image:
                linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0)),
                repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0, 0, 0, 0.025) 30px, rgba(0, 0, 0, 0.025) 31px);
            border: 2px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 18px 40px rgba(58, 50, 44, 0.22);
        }

        .modal-header {
            position: relative;
            padding: 26px 58px 18px 26px;
            border-bottom: 1px solid rgba(189, 155, 91, 0.32);
        }

        .modal-title {
            margin: 0;
            color: var(--king-bg);
            font-size: clamp(1.5rem, 3vw, 2rem);
            letter-spacing: 0.08em;
        }

        .modal-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            border: 0;
            background: transparent;
            color: var(--king-bg);
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--text-dark);
        }

        .modal-body {
            padding: 22px 26px 24px;
            overflow-y: auto;
            color: #4b4038;
        }

        .modal-body::-webkit-scrollbar {
            width: 7px;
        }

        .modal-body::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: rgba(189, 155, 91, 0.7);
        }

        .modal-section + .modal-section {
            margin-top: 18px;
        }

        .modal-section h3 {
            margin: 0 0 8px;
            color: var(--minister-bg);
            font-size: 0.96rem;
            letter-spacing: 0.08em;
        }

        .modal-box {
            background: rgba(244, 238, 220, 0.74);
            border: 1px solid rgba(189, 155, 91, 0.28);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .modal-box p {
            margin: 0;
            font-size: 0.98rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .modal-title ruby {
            ruby-align: center;
        }

        .modal-title rt {
            color: var(--muted);
            font-size: 0.38em;
            letter-spacing: 0.02em;
        }

        .modal-box.is-classical {
            border-left: 4px solid var(--gold);
        }

        .modal-source {
            margin-top: 18px;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .modal-source a {
            color: var(--minister-bg);
            text-decoration: none;
            border-bottom: 1px dashed rgba(43, 76, 80, 0.4);
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-open-section {
            appearance: none;
            border: 1px solid rgba(43, 76, 80, 0.25);
            border-radius: 999px;
            background: rgba(43, 76, 80, 0.08);
            color: var(--minister-bg);
            padding: 8px 14px;
            font: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.16s ease, transform 0.16s ease, border-color 0.16s ease;
        }

        .modal-open-section:hover,
        .modal-open-section:focus-visible {
            background: rgba(43, 76, 80, 0.14);
            border-color: rgba(43, 76, 80, 0.45);
            transform: translateY(-1px);
            outline: none;
        }

        .loading,
        .error-state {
            width: min(720px, 100%);
            margin: 24px auto 0;
            padding: 18px 20px;
            background: var(--paper);
            border: 1px solid rgba(189, 155, 91, 0.4);
            border-radius: 8px;
            box-shadow: var(--shadow);
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 1320px) {
            .departments-row {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .container {
                padding: 44px 14px 72px;
            }

            .border-outer {
                inset: 6px;
                border-width: 3px;
            }

            .border-inner {
                inset: 12px;
            }

            .departments-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .king-wrap::after {
                display: none;
            }

            .modal-header {
                padding: 22px 52px 16px 20px;
            }

            .modal-body {
                padding: 18px 20px 22px;
            }

            .info-wrap.is-header .info-popover {
                left: 0;
                right: auto;
                transform: none;
            }
        }

        @media (max-width: 560px) {
            .departments-row {
                grid-template-columns: 1fr;
            }

            .king-node {
                padding: 20px 26px;
            }

            .references-panel {
                padding: 16px;
            }

            .modal {
                padding: 12px;
            }

            .header-meta {
                gap: 8px;
            }

            .minister-title-row {
                padding-right: 24px;
            }

            .s-head {
                align-items: flex-start;
            }

        }
    </style>
</head>
<body>
    <div class="border-outer"></div>
    <div class="border-inner"></div>

    <main class="container">
        <header class="header">
            <h1 id="pageTitle">周礼六官学习图</h1>
            <div class="header-meta">
                <p id="pageSubtitle">按《周礼》六官与《考工记》冬官条目重整</p>
                <div class="info-wrap is-header" id="pageInfoWrap">
                    <button class="info-btn" id="pageInfoBtn" type="button" aria-label="查看阅读说明" aria-expanded="false">i</button>
                    <div class="info-popover is-wide" id="pageInfoPopover" hidden>
                        <h2 class="info-popover-title">阅读说明</h2>
                        <ul class="info-list" id="pageInfoList"></ul>
                        <p class="info-footnote" id="pageInfoFootnote"></p>
                    </div>
                </div>
            </div>
            <div class="ornament"></div>
        </header>

        <div class="org-tree">
            <div class="king-wrap">
                <div class="king-node">
                    <h2 class="king-title">周王</h2>
                    <p class="king-sub">天子 · 六官统摄中枢</p>
                </div>
            </div>

            <div id="loadingState" class="loading">正在装载校订后的《周礼》条目……</div>
            <div id="errorState" class="error-state" hidden>数据载入失败，请确认 `site-data.js` 存在且格式正确。</div>
            <div id="departmentsRow" class="departments-row" hidden></div>
        </div>

        <section class="references-panel" aria-labelledby="referencesTitle">
            <h2 class="panel-title" id="referencesTitle">资料来源</h2>
            <ul id="referencesList"></ul>
        </section>
    </main>

    <div class="modal" id="infoModal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-header">
                <button class="close-btn" id="closeBtn" type="button" aria-label="关闭弹窗">&times;</button>
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="./title-pronunciations.js"></script>
    <script src="./site-data.js"></script>
    <script>
        const dom = {
            title: document.getElementById("pageTitle"),
            subtitle: document.getElementById("pageSubtitle"),
            pageInfoWrap: document.getElementById("pageInfoWrap"),
            pageInfoList: document.getElementById("pageInfoList"),
            pageInfoFootnote: document.getElementById("pageInfoFootnote"),
            references: document.getElementById("referencesList"),
            row: document.getElementById("departmentsRow"),
            loading: document.getElementById("loadingState"),
            error: document.getElementById("errorState"),
            modal: document.getElementById("infoModal"),
            modalTitle: document.getElementById("modalTitle"),
            modalSubtitle: document.getElementById("modalSubtitle"),
            modalBody: document.getElementById("modalBody"),
            closeBtn: document.getElementById("closeBtn")
        };

        let lastFocusedCard = null;
        const PAGE_FOOTNOTE = "卡片点开后可直接看本条原文全文与整段白话；每卷标题下方的“本卷全文”会在站内打开整卷原文，外部底本和《周礼注疏》参考链接仍然保留。";
        const TITLE_PRONUNCIATIONS = window.__TITLE_PRONUNCIATIONS__ || {};

        function createElement(tag, className, text) {
            const element = document.createElement(tag);
            if (className) {
                element.className = className;
            }
            if (text) {
                element.textContent = text;
            }
            return element;
        }

        function renderList(target, items, asLinks = false) {
            target.innerHTML = "";

            items.forEach((item) => {
                const li = document.createElement("li");
                if (asLinks) {
                    const link = document.createElement("a");
                    link.href = item.url;
                    link.target = "_blank";
                    link.rel = "noreferrer";
                    link.textContent = item.label;
                    li.appendChild(link);
                } else {
                    li.textContent = item;
                }
                target.appendChild(li);
            });
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function buildRuby(term, pronunciation) {
            return `<ruby>${escapeHtml(term)}<rt>${escapeHtml(pronunciation)}</rt></ruby>`;
        }

        function annotateTitle(title) {
            const pronunciation = TITLE_PRONUNCIATIONS[title];
            if (!pronunciation) {
                return escapeHtml(title);
            }
            return buildRuby(title, pronunciation);
        }

        function compactSubtitle(text) {
            if (!text) {
                return "";
            }
            return text.split(/[，。]/)[0] || text;
        }

        function setInfoOpen(wrapper, shouldOpen) {
            if (!wrapper) {
                return;
            }
            const button = wrapper.querySelector(".info-btn");
            const popover = wrapper.querySelector(".info-popover");
            wrapper.classList.toggle("open", shouldOpen);
            if (button) {
                button.setAttribute("aria-expanded", String(shouldOpen));
            }
            if (popover) {
                popover.hidden = !shouldOpen;
            }
        }

        function closeAllInfo(except = null) {
            document.querySelectorAll(".info-wrap.open").forEach((wrapper) => {
                if (wrapper !== except) {
                    setInfoOpen(wrapper, false);
                }
            });
        }

        function attachInfoBehavior(wrapper) {
            const button = wrapper.querySelector(".info-btn");
            const popover = wrapper.querySelector(".info-popover");
            if (!button || !popover) {
                return wrapper;
            }

            button.addEventListener("click", (event) => {
                event.stopPropagation();
                const shouldOpen = !wrapper.classList.contains("open");
                closeAllInfo(shouldOpen ? wrapper : null);
                setInfoOpen(wrapper, shouldOpen);
            });

            popover.addEventListener("click", (event) => {
                event.stopPropagation();
            });

            return wrapper;
        }

        function buildInfoWrap(content, options = {}) {
            const wrapper = createElement(
                "div",
                `info-wrap${options.header ? " is-header" : ""}`
            );
            const button = createElement("button", "info-btn", "i");
            button.type = "button";
            button.setAttribute("aria-label", options.label || "查看说明");

            const popover = createElement(
                "div",
                `info-popover${options.wide ? " is-wide" : ""}`
            );
            popover.hidden = true;

            if (options.title) {
                popover.appendChild(createElement("h3", "info-popover-title", options.title));
            }

            if (Array.isArray(content)) {
                const list = createElement("ul", "info-list");
                content.forEach((item) => {
                    const li = document.createElement("li");
                    li.textContent = item;
                    list.appendChild(li);
                });
                popover.appendChild(list);
            } else {
                const paragraph = createElement("p", "", content);
                popover.appendChild(paragraph);
            }

            wrapper.append(button, popover);
            return attachInfoBehavior(wrapper);
        }

        function buildDepartment(section) {
            const column = createElement("section", "dept-col");
            const minister = createElement("div", "minister-node");
            const header = createElement("div", "minister-header");
            const titleRow = createElement("div", "minister-title-row");

            const seal = createElement("div", "seal", section.seal);
            const title = createElement("h3", "m-title", section.title);
            const desc = createElement("p", "m-sub", section.desc);
            const source = document.createElement("button");
            source.type = "button";
            source.className = "source-button";
            source.textContent = "本卷全文";
            source.setAttribute("aria-label", `查看${section.title}全文`);
            source.addEventListener("click", () => {
                openSectionModal(section, source);
            });

            titleRow.appendChild(title);
            header.append(titleRow, desc, source);
            minister.append(seal, header);

            const list = createElement("div", "sub-list");
            section.items.forEach((item) => {
                const card = createElement("article", "sub-node");
                card.tabIndex = 0;
                card.setAttribute("role", "button");
                card.setAttribute("aria-label", `查看${item.title}详情`);

                const head = createElement("div", "s-head");
                const cardTitle = createElement("p", "s-title", item.title);
                head.appendChild(cardTitle);

                card.addEventListener("click", () => {
                    openModal(section, item, card);
                });
                card.addEventListener("keydown", (event) => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        openModal(section, item, card);
                    }
                });

                card.appendChild(head);
                if (item.summary) {
                    card.appendChild(createElement("p", "s-desc", item.summary));
                }
                list.appendChild(card);
            });

            column.append(minister, list);
            return column;
        }

        function buildModalSection(title, content, classical = false) {
            const section = createElement("section", "modal-section");
            const heading = createElement("h3", "", title);
            const box = createElement("div", `modal-box${classical ? " is-classical" : ""}`);
            const paragraph = createElement("p", "", content);
            box.appendChild(paragraph);
            section.append(heading, box);
            return section;
        }

        function appendExternalLinks(container, links) {
            links.forEach((link, index) => {
                if (index > 0) {
                    container.append(" · ");
                }
                const anchor = document.createElement("a");
                anchor.href = link.url;
                anchor.target = "_blank";
                anchor.rel = "noreferrer";
                anchor.textContent = link.label;
                container.appendChild(anchor);
            });
        }

        function buildReferenceSection(section, item = null, includeReaderButton = false) {
            const refSection = createElement("section", "modal-section");
            const heading = createElement("h3", "", "参考入口");
            refSection.appendChild(heading);

            if (includeReaderButton) {
                const actions = createElement("div", "modal-actions");
                const readerButton = createElement("button", "modal-open-section", "本卷全文");
                readerButton.type = "button";
                readerButton.addEventListener("click", () => {
                    openSectionModal(section);
                });
                actions.appendChild(readerButton);
                refSection.appendChild(actions);
            }

            const links = [];
            if (section.sourceUrl) {
                links.push({ label: "维基文库底本", url: section.sourceUrl });
            }
            if (section.commentaryUrl) {
                links.push({ label: "周礼注疏", url: section.commentaryUrl });
            }
            if (section.translationUrl) {
                links.push({ label: "5000言总览", url: section.translationUrl });
            }
            if (item && item.pageUrl) {
                links.push({ label: "本条分条页", url: item.pageUrl });
            }

            if (links.length) {
                const source = createElement("p", "modal-source");
                appendExternalLinks(source, links);
                refSection.appendChild(source);
            }

            return refSection;
        }

        function showModal() {
            dom.modal.classList.add("open");
            dom.modal.setAttribute("aria-hidden", "false");
            document.body.style.overflow = "hidden";
            dom.closeBtn.focus();
        }

        function openModal(section, item, trigger) {
            closeAllInfo();
            lastFocusedCard = trigger;
            dom.modalTitle.innerHTML = annotateTitle(item.title);
            dom.modalSubtitle.textContent = `${section.title} · ${item.summary}`;
            dom.modalBody.innerHTML = "";

            if (item.meta) {
                dom.modalBody.appendChild(buildModalSection(item.metaLabel || "建置", item.meta));
            }
            if (item.group) {
                dom.modalBody.appendChild(buildModalSection(item.groupLabel || "所属序官", item.group));
            }
            if (item.peer) {
                dom.modalBody.appendChild(buildModalSection(item.peerLabel || "同列官", item.peer));
            }
            if (item.fullClassical || item.classical) {
                dom.modalBody.appendChild(buildModalSection("原文全文", item.fullClassical || item.classical, true));
            }
            if (item.fullTranslation || item.translation) {
                dom.modalBody.appendChild(buildModalSection("白话通解", item.fullTranslation || item.translation));
            }
            if (item.note) {
                dom.modalBody.appendChild(buildModalSection("补充说明", item.note));
            }
            dom.modalBody.appendChild(buildReferenceSection(section, item, true));

            showModal();
        }

        function openSectionModal(section, trigger = null) {
            closeAllInfo();
            if (trigger) {
                lastFocusedCard = trigger;
            }

            dom.modalTitle.textContent = section.title;
            dom.modalSubtitle.textContent = `${section.desc} · 本卷全文`;
            dom.modalBody.innerHTML = "";

            if (section.fullClassical) {
                dom.modalBody.appendChild(buildModalSection("本卷全文", section.fullClassical, true));
            }
            dom.modalBody.appendChild(buildReferenceSection(section));

            showModal();
        }

        function closeModal() {
            dom.modal.classList.remove("open");
            dom.modal.setAttribute("aria-hidden", "true");
            document.body.style.overflow = "";
            if (lastFocusedCard) {
                lastFocusedCard.focus();
            }
        }

        function renderPage(data) {
            dom.title.textContent = data.meta.title;
            dom.subtitle.textContent = compactSubtitle(data.meta.subtitle);
            renderList(dom.pageInfoList, data.meta.notes || []);
            dom.pageInfoFootnote.textContent = PAGE_FOOTNOTE;
            renderList(dom.references, data.meta.references, true);

            dom.row.innerHTML = "";
            data.sections.forEach((section) => {
                dom.row.appendChild(buildDepartment(section));
            });

            dom.loading.hidden = true;
            dom.error.hidden = true;
            dom.row.hidden = false;
        }

        function loadPage() {
            try {
                const data = window.__SITE_DATA__;
                if (!data || !data.meta || !Array.isArray(data.sections)) {
                    throw new Error("site-data.js did not provide valid data");
                }
                renderPage(data);
            } catch (error) {
                console.error(error);
                dom.loading.hidden = true;
                dom.row.hidden = true;
                dom.error.hidden = false;
            }
        }

        dom.closeBtn.addEventListener("click", closeModal);
        dom.modal.addEventListener("click", (event) => {
            if (event.target === dom.modal) {
                closeModal();
            }
        });

        attachInfoBehavior(dom.pageInfoWrap);

        document.addEventListener("click", (event) => {
            if (!event.target.closest(".info-wrap")) {
                closeAllInfo();
            }
        });

        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && dom.modal.classList.contains("open")) {
                closeModal();
                return;
            }
            if (event.key === "Escape") {
                closeAllInfo();
            }
        });

        loadPage();
    </script>
</body>
</html>
